{% set name = "enso_metrics" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/CLIVAR-PRP/ENSO_metrics/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 1b09f57803777fafde43edc508b7a2b5934b0faf2ddcfe1a7acf30ecccca6b39

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    python >={{ python_min }}
    - cartopy
    - xarray
    - xcdat
    - cftime
    - numpy
    - scipy
    - matplotlib-base
    - cartopy
    - cmocean
    - regionmask
    - xesmf
    - udunits2
    - packaging

test:
  imports:
    - EnsoMetrics.EnsoCollectionsLib
    - EnsoMetrics.EnsoComputeMetricsLib
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/CLIVAR-PRP/ENSO_metrics
  license: BSD-3-Clause
  license_file: LICENSE
  summary: "Library to compute ENSO metrics"

extra:
  recipe-maintainers:
    - lee1043
    - kristinchang3
    - yyplanton
    - eguil
